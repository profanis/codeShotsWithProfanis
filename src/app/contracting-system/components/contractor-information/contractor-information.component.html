<mat-card class="card__container card__container--large">
  <mat-card-title>Contractor Information</mat-card-title>
  <mat-form-field>
    <mat-label>Contractor's Full Name or Company Name</mat-label>
    <input matInput [field]="contractorInformation().contractorName" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Contractor's Business License Number</mat-label>
    <input matInput [field]="contractorInformation().contractorLicenseNumber" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Primary Contact Person</mat-label>
    <input matInput [field]="contractorInformation().contractorContact" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Contractor's Address</mat-label>
    <input matInput [field]="contractorInformation().contractorAddress" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Contact Phone Number</mat-label>
    <input matInput [field]="contractorInformation().contractorPhone" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput [field]="contractorInformation().contractorEmail" />
  </mat-form-field>
</mat-card>
