<div>
  <label for="hobbies">Hobbies:</label>
  @for (hobby of myForm; track $index) {
    <div>
      <label>Name:</label>
      <input type="text" [control]="hobby.name" />
    </div>
    <div>
      <label>Description:</label>
      <input type="text" [control]="hobby.description" />
    </div>
    @if (hobby().errors().length) {
      {{ hobby().errors() | json }}
    }
  }

  <button type="button" (click)="addHobby()">Add Hobby</button>
</div>
