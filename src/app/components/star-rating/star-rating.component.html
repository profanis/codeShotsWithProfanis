<div class="star-rating">
  @for (star of stars(); track star.index) {
    <span
      class="star"
      [class.filled]="star.filled"
      [attr.aria-label]="
        'Star ' + star.index + (star.filled ? ' filled' : ' empty')
      "
      [attr.tabindex]="0"
      [attr.role]="'button'"
      (click)="onStarClick(star.index)"
      (keydown.enter)="onStarClick(star.index)"
      (keydown.space)="onStarClick(star.index)"
    >
      ★
    </span>
  }
  <span class="sr-only"
    >Rating: {{ value() }} out of {{ maxStars() }} stars</span
  >
</div>
